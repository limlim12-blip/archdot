####################
### OTHER CONFIG ###
####################
source = ~/.config/hypr/hyprkeybind.conf

################
### MONITORS ###
################

monitor = HDMI-A-1, 2560x1440@120, 0x0, 1
monitor = DP-1, 2560x1440@59.95, 0x0, 1
monitor = eDP-1, 2560x1440@60, 2560x0, 1.33

#################
### AUTOSTART ###
#################
exec-once = nm-applet &
exec-once = pipewire
exec-once = kanshi
exec-once = [workspace 1 silent] kitty --class spotify_player -e spotify_player
exec-once = [workspace 2 silent] kitty tmux
# exec-once = [workspace 3 silent] google-chrome-stable
exec-once = [workspace 3 silent]  zen-twilight
exec-once = [workspace special:btop silent] kitty --class btop -e btop
# exec-once = [workspace special:file_manager silent] [float; size 625 460] kitty --class file_manager -e yazi
exec-once = clipse -listen # run listener on startup
exec-once = uwsm app -- fcitx5
exec-once = uwsm app -- awww-daemon
exec-once = uwsm app -- waybar
exec-once = uwsm app -- dunst
exec-once = uwsm app -- blueman-applet
exec-once = xdg-desktop-portal-hyprland
exec-once = /usr/local/libexec/file_manager_dbus
exec-once = hyprctl setcursor TinyHand-ZRKL 24
# exec-once = hyprsunset --temperature 6000 --identity DP-1
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'TinyHand-ZRKL'
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24

#for libadwaita gtk4 apps you can use this command:
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps

#for gtk3 apps you need to install adw-gtk3 theme 
exec = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3"   # for GTK3 apps

#for kde apps you need to install: sudo pacman -S qt5ct qt6ct kvantum kvantum breeze-icons   
#you will need to set dark theme for qt apps from kde more difficult thans with gnome :D:
env = QT_QPA_PLATFORMTHEME,qt6ct   # for Qt apps# Theme

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,TinyHand-ZRKL
env = HYPRCURSOR_SIZE,24
env = WINE_X11_NO_MITSHM,1
env = MOZ_DISABLE_RDD_SANDBOX, 1

env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = NVD_BACKEND,direct

env = XMODIFIERS, @im=fcitx
env = GDK_SCALE,0.5
env = SDL_IM_MODULE, fcitx
env = GLFW_IM_MODULE, fcitx
env = ELECTRON_OZONE_PLATFORM_HINT, auto

env = MOZ_ENABLE_WAYLAND,1
env = MOZ_DBUS_REMOTE,1
#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/
# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 2

    border_size = 4

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(ee625fff)
    col.inactive_border = rgba(00000000)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 5
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
        range = 4
        render_power = 3
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = false
        size = 0
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = false

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
    bezier = myBezier, 0.10, 0.9, 0.1, 1.05

    animation = windows, 1, 5, myBezier, slide
    animation = windowsOut, 1, 5, myBezier, slide
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}


dwindle {
    pseudotile = true 
    preserve_split = true 
    force_split = 2
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
    allow_small_split = true
    special_scale_factor = 0.95
    mfact = 0.5
    new_status = slave
    new_on_top = on
    smart_resizing = true
}

misc {
    vfr = true
    vrr = 1
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    disable_splash_rendering = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
}



#############
### INPUT ###
#############

input {
    kb_layout = 
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    repeat_rate = 80
    repeat_delay = 300
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    touchpad {
        natural_scroll = true
    }

}
gesture = 3, horizontal, workspace
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


##############################
### WINDOWS AND WORKSPACES ###
##############################
windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}


windowrule = match:class ^(btop)$, workspace special:btop
# windowrule = match:class ^(file_manager)$, workspace special:file_manager
windowrule = match:class clipse, float true 
windowrule = match:class clipse, size 622 652

workspace = 1, monitor:eDP-1
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1

workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1

windowrule {
    name = fzf-clip
    float = 1
    size = 50% 60%
    center = 1
}

